name: 🚀 Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: copa-docs
  CONTAINER_NAME: copa-docs
  NETWORK_NAME: main-network
  DOCS_PORT: 3080
  NODE_VERSION: '20'

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  # ============================================
  # JOB 1: Build Docker Image
  # ============================================
  build:
    name: 🏗️ Build & Push
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Generate Version
        id: version
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          VERSION="docs-${TIMESTAMP}-${SHORT_SHA}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker Image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} .

      - name: 💾 Save Image
        run: |
          docker save ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} | gzip > copa-docs.tar.gz
          ls -lh copa-docs.tar.gz

      - name: 📡 Transfer to Server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.DO_PORT }} -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

          scp -P ${{ secrets.DO_PORT }} -o StrictHostKeyChecking=no \
            copa-docs.tar.gz ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }}:/tmp/

  # ============================================
  # JOB 2: Deploy
  # ============================================
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: 🚀 Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        env:
          VERSION: ${{ needs.build.outputs.version }}
          DOCKER_IMAGE: ${{ env.IMAGE_NAME }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_PRIVATE_KEY }}
          port: ${{ secrets.DO_PORT }}
          envs: VERSION,DOCKER_IMAGE
          command_timeout: 5m
          script: |
            set -e

            echo "📚 Deploying Copa Docs..."
            echo "📦 Version: ${VERSION}"

            # Load image
            gunzip -c /tmp/copa-docs.tar.gz | docker load
            rm -f /tmp/copa-docs.tar.gz

            IMAGE_TAG="${DOCKER_IMAGE}:${VERSION}"

            # Create network if not exists
            docker network create ${{ env.NETWORK_NAME }} 2>/dev/null || true

            # Stop existing container
            docker stop ${{ env.CONTAINER_NAME }} --time 10 2>/dev/null || true
            docker rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            # Deploy
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --network ${{ env.NETWORK_NAME }} \
              --restart unless-stopped \
              --memory=128m \
              --cpus=0.5 \
              --label "app=copa-docs" \
              --label "version=${VERSION}" \
              --label "deployed=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              $IMAGE_TAG

            echo "✅ Copa Docs deployed on port ${{ env.DOCS_PORT }}"

      - name: ✅ Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_PRIVATE_KEY }}
          port: ${{ secrets.DO_PORT }}
          command_timeout: 2m
          script: |
            sleep 5
            CONTAINER_STATUS=$(docker inspect --format='{{.State.Status}}' ${{ env.CONTAINER_NAME }} 2>/dev/null || echo "not_found")
            if [ "$CONTAINER_STATUS" = "running" ]; then
              echo "✅ Copa Docs container is running"
              exit 0
            fi
            echo "❌ Container not running: $CONTAINER_STATUS"
            docker logs ${{ env.CONTAINER_NAME }} --tail 20 2>&1 || true
            exit 1

      - name: 🧹 Cleanup
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_PRIVATE_KEY }}
          port: ${{ secrets.DO_PORT }}
          script: |
            docker image prune -f 2>/dev/null || true
            docker images "${{ env.IMAGE_NAME }}" --format "table {{.Tag}}\t{{.Size}}\t{{.CreatedAt}}"

  # ============================================
  # JOB 3: Notify
  # ============================================
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gather deploy data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git log --no-merges --pretty=format:'%s' HEAD~10..HEAD > /tmp/direct_commits.txt
          PR_NUMBERS=$(git log --merges --pretty=format:'%s' HEAD~10..HEAD | grep -oP '#\K[0-9]+' | sort -u || echo "")
          for PR_NUM in $PR_NUMBERS; do
            gh pr view "$PR_NUM" --json number,title,author 2>/dev/null >> /tmp/pr_data_raw.txt || true
          done

      - name: 📢 Slack - Success
        if: needs.deploy.result == 'success'
        continue-on-error: true
        run: |
          python3 << 'PYEOF'
          import json, requests
          version = "${{ needs.build.outputs.version }}"
          author = "${{ github.actor }}"
          webhook = "${{ secrets.SLACK_WEBHOOK_URL }}"
          workflow_url = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          pr_blocks = []
          try:
              with open("/tmp/pr_data_raw.txt") as f:
                  for line in f:
                      if not line.strip(): continue
                      try:
                          pr = json.loads(line.strip())
                          pr_blocks.append(f"• PR #{pr.get('number','?')} — {pr.get('title','')}")
                      except: continue
          except: pass
          commits = []
          try:
              with open("/tmp/direct_commits.txt") as f:
                  for line in f:
                      msg = line.strip()
                      if msg and not msg.startswith("Merge"):
                          for p in ["feat: ","fix: ","docs: ","chore: "]:
                              if msg.lower().startswith(p): msg = msg[len(p):]; break
                          commits.append(f"• {msg[0].upper()+msg[1:]}" if msg else "")
          except: pass
          changes = "\n".join(pr_blocks[:5]) if pr_blocks else "\n".join(commits[:5]) if commits else "Routine updates"
          blocks = [
              {"type":"header","text":{"type":"plain_text","text":"Copa Docs — Deployed","emoji":True}},
              {"type":"section","fields":[
                  {"type":"mrkdwn","text":f"*Version:* `{version}`"},
                  {"type":"mrkdwn","text":f"*By:* {author}"}
              ]},
              {"type":"section","text":{"type":"mrkdwn","text":changes}},
              {"type":"actions","elements":[
                  {"type":"button","text":{"type":"plain_text","text":"Docs","emoji":True},"url":"https://docs.copa.rw","style":"primary"},
                  {"type":"button","text":{"type":"plain_text","text":"Workflow","emoji":True},"url":workflow_url}
              ]}
          ]
          try: requests.post(webhook, json={"blocks":blocks}, timeout=10)
          except: pass
          PYEOF
