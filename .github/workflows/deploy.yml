name: 🚀 Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: copa-docs
  CONTAINER_NAME: copa-docs
  NETWORK_NAME: main-network
  DOCS_PORT: 3080
  NODE_VERSION: '20'

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  # ============================================
  # JOB 1: Build Docker Image
  # ============================================
  build:
    name: 🏗️ Build & Push
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Generate Version
        id: version
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          VERSION="docs-${TIMESTAMP}-${SHORT_SHA}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker Image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} .

      - name: 💾 Save Image
        run: |
          docker save ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} | gzip > copa-docs.tar.gz
          ls -lh copa-docs.tar.gz

      - name: 📡 Transfer to Server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.DO_PORT }} -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

          scp -P ${{ secrets.DO_PORT }} -o StrictHostKeyChecking=no \
            copa-docs.tar.gz ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }}:/tmp/

  # ============================================
  # JOB 2: Deploy
  # ============================================
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: 🚀 Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        env:
          VERSION: ${{ needs.build.outputs.version }}
          DOCKER_IMAGE: ${{ env.IMAGE_NAME }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_PRIVATE_KEY }}
          port: ${{ secrets.DO_PORT }}
          envs: VERSION,DOCKER_IMAGE
          command_timeout: 5m
          script: |
            set -e

            echo "📚 Deploying Copa Docs..."
            echo "📦 Version: ${VERSION}"

            # Load image
            gunzip -c /tmp/copa-docs.tar.gz | docker load
            rm -f /tmp/copa-docs.tar.gz

            IMAGE_TAG="${DOCKER_IMAGE}:${VERSION}"

            # Create network if not exists
            docker network create ${{ env.NETWORK_NAME }} 2>/dev/null || true

            # Stop existing container
            docker stop ${{ env.CONTAINER_NAME }} --time 10 2>/dev/null || true
            docker rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            # Deploy
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --network ${{ env.NETWORK_NAME }} \
              --restart unless-stopped \
              --memory=128m \
              --cpus=0.5 \
              --label "app=copa-docs" \
              --label "version=${VERSION}" \
              --label "deployed=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              $IMAGE_TAG

            echo "✅ Copa Docs deployed on port ${{ env.DOCS_PORT }}"

      - name: ✅ Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_PRIVATE_KEY }}
          port: ${{ secrets.DO_PORT }}
          command_timeout: 2m
          script: |
            MAX_ATTEMPTS=6
            ATTEMPT=0
            while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
              ATTEMPT=$((ATTEMPT + 1))
              CONTAINER_STATUS=$(docker inspect --format='{{.State.Status}}' ${{ env.CONTAINER_NAME }} 2>/dev/null || echo "not_found")
              if [ "$CONTAINER_STATUS" = "running" ]; then
                # Check inside container since no host port mapped
                HTTP_STATUS=$(docker exec ${{ env.CONTAINER_NAME }} wget -q -O /dev/null -S http://localhost:80 2>&1 | grep "HTTP/" | awk '{print $2}' || echo "000")
                if [ "$HTTP_STATUS" = "200" ]; then
                  echo "✅ Docs healthy! Container running, HTTP $HTTP_STATUS"
                  exit 0
                fi
              fi
              echo "⏳ Attempt $ATTEMPT/$MAX_ATTEMPTS - Status: $CONTAINER_STATUS"
              sleep 5
            done
            echo "❌ Health check failed"
            docker logs ${{ env.CONTAINER_NAME }} --tail 20 2>&1 || true
            exit 1

      - name: 🧹 Cleanup
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_PRIVATE_KEY }}
          port: ${{ secrets.DO_PORT }}
          script: |
            docker image prune -f 2>/dev/null || true
            docker images "${{ env.IMAGE_NAME }}" --format "table {{.Tag}}\t{{.Size}}\t{{.CreatedAt}}"

  # ============================================
  # JOB 3: Notify
  # ============================================
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 📢 Slack Notification
        if: needs.deploy.result == 'success'
        continue-on-error: true
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          SHORT_SHA=$(git rev-parse --short HEAD)
          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"blocks\": [
                {\"type\": \"header\", \"text\": {\"type\": \"plain_text\", \"text\": \"📚 Copa Docs Deployed\", \"emoji\": true}},
                {\"type\": \"section\", \"fields\": [
                  {\"type\": \"mrkdwn\", \"text\": \"*Version:*\n\`${{ needs.build.outputs.version }}\`\"},
                  {\"type\": \"mrkdwn\", \"text\": \"*Commit:*\n\`${SHORT_SHA}\` — ${COMMIT_MSG}\"}
                ]}
              ]
            }" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
